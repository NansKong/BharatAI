<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Deadline Reminder</title>
</head>

<body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:24px;background:#f9f9f9;">
    <div style="background:#fff;border-radius:8px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
        <h2 style="color:#0A1628;margin-top:0">⏰ Deadline Reminder</h2>
        <p>Hi <strong>{{ user_name }}</strong>,</p>
        <p>The deadline for the following opportunity is approaching:</p>
        <div style="background:#fff8e1;border-left:4px solid #FF9933;padding:16px;border-radius:4px;margin:16px 0">
            <strong>{{ opp_title }}</strong><br>
            <span style="color:#e65100;font-weight:bold">⚠ {{ days_remaining }} day(s) remaining</span>
        </div>
        <p>Don't miss out — complete your application before the deadline.</p>
        <p style="color:#888;font-size:12px;margin-top:32px">BharatAI · Empowering Indian Students</p>
    </div>
</body>

</html>
