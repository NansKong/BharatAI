<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>New Opportunity Match</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:24px;background:#f9f9f9;">
  <div style="background:#fff;border-radius:8px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <h2 style="color:#0A1628;margin-top:0">🎯 New Opportunity Match</h2>
    <p>Hi <strong>{{ user_name }}</strong>,</p>
    <p>We found a new opportunity that matches your profile:</p>
    <div style="background:#f0f7ff;border-left:4px solid #00BFA5;padding:16px;border-radius:4px;margin:16px 0">
      <strong style="font-size:1.1em">{{ opp_title }}</strong>
    </div>
    <a href="{{ opp_link }}" style="display:inline-block;background:#FF9933;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:bold;margin-top:8px">
      View Opportunity →
    </a>
    <p style="color:#888;font-size:12px;margin-top:32px">BharatAI · Empowering Indian Students</p>
  </div>
</body>
</html>
